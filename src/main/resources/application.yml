server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    enabled: true

spring:
  application:
    name: agent-eval-lite
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

logging:
  level:
    io.github.panris.agenteval: DEBUG
    org.springframework.web: INFO

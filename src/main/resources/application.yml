server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    enabled: true

spring:
  application:
    name: agent-eval-lite
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# Data Storage Configuration
data:
  dir: data  # Data directory for JSON file storage

# Agent Configuration
agent:
  default:
    type: demo  # demo, http, openai
  
  # HTTP Agent Configuration
  http:
    endpoint: ""  # e.g., http://localhost:8000/api/chat
    timeout: 30000
  
  # OpenAI Agent Configuration
  openai:
    api-key: ""  # Set via environment variable: OPENAI_API_KEY
    model: "gpt-3.5-turbo"
    endpoint: "https://api.openai.com/v1/chat/completions"
    system-prompt: ""  # Optional system prompt

logging:
  level:
    io.github.panris.agenteval: DEBUG
    org.springframework.web: INFO

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 管理 - Agent Eval Lite</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script src="/js/utils.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">🤖 Agent Eval Lite</a>
        <div class="navbar-links">
            <a href="/" class="navbar-link">🏠 首页</a>
            <a href="/manage" class="navbar-link">📊 管理</a>
            <a href="/agents" class="navbar-link active">🤖 Agent</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Agent 管理</h1>
        <p class="page-subtitle">配置和管理评测 Agent，支持 OpenAI、Claude、自定义 HTTP 等多种类型</p>

        <!-- 标签页切换 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('templates')">📦 从模板创建</button>
            <button class="tab" onclick="switchTab('agents')">📋 我的 Agent</button>
        </div>

        <!-- 从模板创建 -->
        <div id="templates-tab" class="tab-content active">
            <div class="template-grid" id="templates-grid">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <div>加载模板中...</div>
                </div>
            </div>
        </div>

        <!-- 我的 Agent -->
        <div id="agents-tab" class="tab-content" style="display:none;">
            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary" onclick="openCreateModal()">
                    ➕ 创建自定义 Agent
                </button>
            </div>
            <div id="agents-list">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <div>加载 Agent 列表中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建/编辑 Agent 弹窗 -->
    <div id="agent-modal" class="modal agent-modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">创建 Agent</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="agent-form">
                    <input type="hidden" id="agent-id">

                    <div class="form-group">
                        <label class="form-label">名称 *</label>
                        <input type="text" id="agent-name" class="form-input" placeholder="例如：GPT-4 问答 Agent" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">类型 *</label>
                        <select id="agent-type" class="form-select" onchange="updateFormByType()">
                            <option value="openai">OpenAI (GPT-4/GPT-3.5)</option>
                            <option value="claude">Anthropic Claude</option>
                            <option value="http">简单 HTTP (input/output)</option>
                            <option value="custom">自定义 HTTP</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">描述</label>
                        <input type="text" id="agent-description" class="form-input" placeholder="例如：用于问答评测的 GPT-4 Agent">
                    </div>

                    <div class="form-group">
                        <label class="form-label">端点 URL *</label>
                        <input type="text" id="agent-endpoint" class="form-input" placeholder="https://api.openai.com/v1/chat/completions" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">超时时间 (ms)</label>
                        <input type="number" id="agent-timeout" class="form-input" value="30000" placeholder="30000">
                    </div>

                    <!-- OpenAI/Claude 配置 -->
                    <div id="simple-config">
                        <div class="form-group">
                            <label class="form-label">API Key *</label>
                            <input type="password" id="agent-api-key" class="form-input" placeholder="sk-...">
                        </div>
                        <div class="form-group" id="model-field">
                            <label class="form-label">模型</label>
                            <input type="text" id="agent-model" class="form-input" placeholder="gpt-3.5-turbo">
                        </div>
                    </div>

                    <!-- 自定义 HTTP 配置 -->
                    <div id="custom-config" style="display:none;">
                        <h4 style="margin-top: 20px; margin-bottom: 12px; color: var(--text-primary);">请求配置</h4>

                        <div class="form-group">
                            <label class="form-label">请求头 (JSON)</label>
                            <textarea id="agent-headers" class="form-textarea" placeholder='{"Content-Type": "application/json", "Authorization": "Bearer ${apiKey}"}'></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">请求模板</label>
                            <textarea id="agent-request-template" class="form-textarea" placeholder='{"model":"${model}","messages":[{"role":"user","content":"${input}"}]}'></textarea>
                            <small style="color: var(--text-secondary);">使用 ${input} 表示用户输入，${apiKey} 等表示配置变量</small>
                        </div>

                        <div class="form-group">
                            <label class="form-label">静态配置 (JSON)</label>
                            <textarea id="agent-config" class="form-textarea" placeholder='{"model": "gpt-3.5-turbo", "temperature": 0.7}'></textarea>
                        </div>

                        <h4 style="margin-top: 20px; margin-bottom: 12px; color: var(--text-primary);">响应配置</h4>

                        <div class="form-group">
                            <label class="form-label">输出路径</label>
                            <input type="text" id="agent-output-path" class="form-input" placeholder="choices[0].message.content">
                            <small style="color: var(--text-secondary);">JSONPath 格式，如：<code>output</code>、<code>choices[0].message.content</code></small>
                        </div>

                        <div class="form-group">
                            <label class="form-label">错误检测路径</label>
                            <input type="text" id="agent-error-path" class="form-input" placeholder="error">
                        </div>

                        <div class="form-group">
                            <label class="form-label">错误消息路径</label>
                            <input type="text" id="agent-error-msg-path" class="form-input" placeholder="error.message">
                        </div>
                    </div>

                    <div style="margin-top: 24px; display: flex; gap: 12px;">
                        <button type="submit" class="btn btn-primary">💾 保存</button>
                        <button type="button" class="btn btn-secondary" onclick="testAgentConfig()">🧪 测试配置</button>
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 测试 Agent 弹窗 -->
    <div id="test-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🧪 测试 Agent</h3>
                <button class="modal-close" onclick="closeTestModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">测试输入</label>
                    <input type="text" id="test-input" class="form-input" placeholder="你好" value="你好">
                </div>
                <button class="btn btn-primary" onclick="runTest()" style="margin-bottom: 16px;">运行测试</button>
                <div id="test-result"></div>
            </div>
        </div>
    </div>

    <script src="/js/agents.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 配置 - Agent Eval Lite</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script src="/js/utils.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">🤖 Agent Eval Lite</a>
        <div class="navbar-links">
            <a href="/" class="navbar-link">🏠 首页</a>
            <a href="/manage" class="navbar-link">📊 管理</a>
            <a href="/agents" class="navbar-link active">🤖 Agent</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    </nav>

    <div class="page-container">
        <!-- 页面头部 -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Agent 配置</h1>
                <p class="page-subtitle">连接外部 Agent，在评测中使用</p>
            </div>
            <div class="page-header-actions">
                <button class="btn btn-outline" onclick="openTemplateModal()">📦 从模板创建</button>
                <button class="btn btn-primary" onclick="openCreateModal()">➕ 新建空白配置</button>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar-row">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="agent-search" class="search-input" placeholder="搜索名称、类型、端点..."
                       oninput="handleSearch(this.value)">
                <button class="search-clear" id="search-clear" style="display:none" onclick="clearSearch()">✕</button>
            </div>
            <div class="toolbar-right">
                <button class="btn btn-ghost" onclick="exportAgents()" title="导出所有 Agent">📤</button>
                <button class="btn btn-ghost" onclick="triggerImport()" title="导入 JSON">📥</button>
            </div>
        </div>

        <!-- Agent 列表 -->
        <div id="agents-list">
            <div class="list-loading">
                <div class="spinner"></div>
                <span>加载中...</span>
            </div>
        </div>
    </div>

    <!-- ================================================
         模板选择弹窗
         ================================================ -->
    <div id="template-modal" class="modal" style="display:none;">
        <div class="modal-panel">
            <div class="modal-header">
                <h3>📦 选择模板</h3>
                <button class="modal-close-btn" onclick="closeTemplateModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="template-list" id="template-list">
                    <div class="list-loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================================================
         创建 / 编辑 Agent 弹窗
         ================================================ -->
    <div id="agent-modal" class="modal" style="display:none;">
        <div class="modal-panel modal-panel-wide">
            <div class="modal-header">
                <h3 id="modal-title">新建 Agent</h3>
                <button class="modal-close-btn" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <form id="agent-form" onsubmit="handleSubmit(event)">
                    <input type="hidden" id="agent-id">

                    <!-- 基本信息 -->
                    <div class="form-section">
                        <div class="form-row-2">
                            <div class="form-group">
                                <label class="form-label">名称 <span class="required">*</span></label>
                                <input type="text" id="agent-name" class="form-input" placeholder="例如：我的 GPT-4 Agent" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">类型</label>
                                <select id="agent-type" class="form-select" onchange="onTypeChange()">
                                    <option value="openai">🟢 OpenAI (GPT-4 / GPT-3.5)</option>
                                    <option value="claude">🟠 Anthropic Claude</option>
                                    <option value="http">🔵 简单 HTTP</option>
                                    <option value="custom">⚪ 自定义 HTTP</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">描述</label>
                            <input type="text" id="agent-description" class="form-input" placeholder="选填，用于备注此 Agent 的用途">
                        </div>
                    </div>

                    <!-- 接口配置 -->
                    <div class="form-section">
                        <div class="form-row-2">
                            <div class="form-group">
                                <label class="form-label">接口地址 <span class="required">*</span></label>
                                <input type="text" id="agent-endpoint" class="form-input" placeholder="https://api.openai.com/v1/chat/completions" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">超时时间</label>
                                <div class="input-group">
                                    <input type="number" id="agent-timeout" class="form-input" value="30000" min="1000" max="300000">
                                    <span class="input-suffix">ms</span>
                                </div>
                            </div>
                        </div>

                        <!-- OpenAI / Claude 专用 -->
                        <div id="type-simple">
                            <div class="form-row-2">
                                <div class="form-group">
                                    <label class="form-label">API Key <span class="required">*</span></label>
                                    <input type="password" id="agent-api-key" class="form-input" placeholder="sk-...">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">模型</label>
                                    <input type="text" id="agent-model" class="form-input" placeholder="gpt-3.5-turbo">
                                </div>
                            </div>
                        </div>

                        <!-- 自定义 HTTP -->
                        <div id="type-advanced" style="display:none;">
                            <div class="form-group">
                                <label class="form-label">请求头 (JSON)</label>
                                <textarea id="agent-headers" class="form-textarea code" rows="2"
                                          placeholder='{"Content-Type": "application/json"}'></textarea>
                            </div>
                            <div class="form-group">
                                <label class="form-label">请求模板 <span class="field-hint">${input} 表示用户输入</span></label>
                                <textarea id="agent-request-template" class="form-textarea code" rows="2"
                                          placeholder='{"messages":[{"role":"user","content":"${input}"}]}'></textarea>
                            </div>
                            <div class="form-group">
                                <label class="form-label">静态配置 (JSON)</label>
                                <textarea id="agent-config" class="form-textarea code" rows="2"
                                          placeholder='{"model":"gpt-3.5-turbo","temperature":0.7}'></textarea>
                            </div>
                            <div class="form-row-3">
                                <div class="form-group">
                                    <label class="form-label">输出路径</label>
                                    <input type="text" id="agent-output-path" class="form-input" placeholder="choices[0].message.content">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">错误路径</label>
                                    <input type="text" id="agent-error-path" class="form-input" placeholder="error">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">错误消息路径</label>
                                    <input type="text" id="agent-error-msg-path" class="form-input" placeholder="error.message">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 底部操作栏 -->
                    <div class="form-footer">
                        <div class="form-footer-left">
                            <button type="button" class="btn btn-ghost" onclick="runQuickTest()">🧪 快速测试</button>
                        </div>
                        <div class="form-footer-right">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                            <button type="submit" id="save-btn" class="btn btn-primary">💾 保存</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ================================================
         快速测试弹窗（独立）
         ================================================ -->
    <div id="test-modal" class="modal" style="display:none;">
        <div class="modal-panel">
            <div class="modal-header">
                <h3 id="test-modal-title">🧪 测试 Agent</h3>
                <button class="modal-close-btn" onclick="closeTestModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">输入</label>
                    <input type="text" id="test-input" class="form-input" placeholder="输入测试内容" value="你好，请介绍一下你自己">
                </div>
                <div id="test-result" class="test-result-area"></div>
                <div class="form-footer-right">
                    <button class="btn btn-secondary" onclick="closeTestModal()">关闭</button>
                    <button class="btn btn-primary" onclick="runTest()">运行测试</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏文件导入 -->
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImportFile(event)">

    <script src="/js/agents.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Eval Lite - 控制台</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <style>
        /* 首页专用样式 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .stat-card .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-card .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .stat-card .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stat-card .stat-trend {
            font-size: 12px;
            margin-top: 8px;
        }

        .stat-trend.up { color: #10b981; }
        .stat-trend.down { color: #ef4444; }

        /* 快速操作卡片 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .action-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .action-card:hover {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }

        .action-card:hover .action-icon,
        .action-card:hover .action-title,
        .action-card:hover .action-desc {
            color: white;
        }

        .action-icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .action-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .action-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 最近评测历史 */
        .recent-reports {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .view-all-link {
            font-size: 14px;
            color: var(--primary-color);
            text-decoration: none;
        }

        .view-all-link:hover {
            text-decoration: underline;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
        }

        .report-table th {
            text-align: left;
            padding: 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border-color);
        }

        .report-table td {
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        .report-table tr:hover {
            background: var(--hover-bg);
        }

        .report-table .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 系统状态卡片 */
        .system-status {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .status-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.healthy { background: #10b981; }
        .status-indicator.warning { background: #f59e0b; }
        .status-indicator.error { background: #ef4444; }

        /* 响应式 */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }

            .report-table {
                font-size: 12px;
            }

            .report-table th:nth-child(3),
            .report-table td:nth-child(3),
            .report-table th:nth-child(4),
            .report-table td:nth-child(4) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" id="theme-btn">🌙</button>
            <div class="header-content">
                <h1>🤖 Agent Eval Lite</h1>
                <p>轻量级 Agent 评测系统</p>
            </div>
            <div style="width: 60px;"></div>
        </div>

        <!-- 数据概览 -->
        <div class="dashboard-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalTestCases">-</div>
                <div class="stat-label">测试用例总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-value" id="totalReports">-</div>
                <div class="stat-label">评测报告总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="avgPassRate">-</div>
                <div class="stat-label">平均通过率</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="avgResponseTime">-</div>
                <div class="stat-label">平均响应时间</div>
            </div>
        </div>

        <!-- 快速操作 -->
        <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary);">快速操作</h2>
        <div class="quick-actions">
            <a href="/manage" class="action-card">
                <span class="action-icon">📝</span>
                <div class="action-title">管理用例</div>
                <div class="action-desc">创建、编辑、导入测试用例</div>
            </a>
            <a href="/manage#eval-tab" class="action-card">
                <span class="action-icon">🚀</span>
                <div class="action-title">开始评测</div>
                <div class="action-desc">选择用例并执行评测</div>
            </a>
            <a href="/manage#history-tab" class="action-card">
                <span class="action-icon">📈</span>
                <div class="action-title">查看报告</div>
                <div class="action-desc">浏览历史评测结果</div>
            </a>
            <a href="/agents" class="action-card">
                <span class="action-icon">🤖</span>
                <div class="action-title">配置 Agent</div>
                <div class="action-desc">管理 Agent 接口配置</div>
            </a>
        </div>

        <!-- 最近评测历史 -->
        <div class="recent-reports">
            <div class="section-header">
                <h2 class="section-title">最近评测记录</h2>
                <a href="/manage#history-tab" class="view-all-link">查看全部 →</a>
            </div>
            <div id="recentReportsContent">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无评测记录</p>
                </div>
            </div>
        </div>

        <!-- 系统状态 -->
        <div class="system-status">
            <h2 class="section-title" style="margin-bottom: 16px;">系统状态</h2>
            <div id="systemStatusContent">
                <!-- 动态加载 -->
            </div>
        </div>
    </div>

    <script th:src="@{/js/utils.js}"></script>
    <script>
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            document.getElementById('theme-btn').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // 加载保存的主题
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const health = await utils.api.get('/api/health');
                const reports = await utils.api.get('/api/reports?size=100');

                document.getElementById('totalTestCases').textContent = health.testCases || 0;
                document.getElementById('totalReports').textContent = health.reports || 0;

                // 计算平均通过率和响应时间
                const reportList = reports.reports || [];
                if (reportList.length > 0) {
                    const avgPassRate = reportList.reduce((sum, r) => {
                        const rate = r.summary?.pass_rate || 0;
                        return sum + rate;
                    }, 0) / reportList.length;

                    const avgTime = reportList.reduce((sum, r) => {
                        const time = r.summary?.avg_response_time || 0;
                        return sum + time;
                    }, 0) / reportList.length;

                    document.getElementById('avgPassRate').textContent = avgPassRate.toFixed(1) + '%';
                    document.getElementById('avgResponseTime').textContent = avgTime.toFixed(0) + 'ms';
                } else {
                    document.getElementById('avgPassRate').textContent = '-';
                    document.getElementById('avgResponseTime').textContent = '-';
                }
            } catch (err) {
                utils.logError('加载统计数据失败:', err);
            }
        }

        // 加载最近评测历史
        async function loadRecentReports() {
            try {
                const data = await utils.api.get('/api/reports?size=5&sort=desc');
                const reports = data.reports || [];

                const container = document.getElementById('recentReportsContent');

                if (reports.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>暂无评测记录</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>报告ID</th>
                                <th>评测时间</th>
                                <th>通过率</th>
                                <th>分组</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${reports.map(r => `
                                <tr>
                                    <td><code>${utils.escapeHtml(r.id)}</code></td>
                                    <td>${r.timestamp ? new Date(r.timestamp).toLocaleString() : '-'}</td>
                                    <td>
                                        <span class="badge ${(r.summary?.pass_rate || 0) >= 70 ? 'badge-success' : 'badge-danger'}">
                                            ${(r.summary?.pass_rate || 0).toFixed(1)}%
                                        </span>
                                    </td>
                                    <td>${r.group ? utils.escapeHtml(r.group) : '-'}</td>
                                    <td>
                                        <a href="/manage#history-tab" class="view-all-link">查看详情</a>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (err) {
                utils.logError('加载评测历史失败:', err);
            }
        }

        // 加载系统状态
        async function loadSystemStatus() {
            try {
                const health = await utils.api.get('/api/health');

                const container = document.getElementById('systemStatusContent');
                container.innerHTML = `
                    <div class="status-item">
                        <span class="status-label">服务状态</span>
                        <span class="status-value">
                            <span class="status-indicator ${health.status === 'UP' ? 'healthy' : 'error'}"></span>
                            ${health.status === 'UP' ? '运行正常' : '异常'}
                        </span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">版本</span>
                        <span class="status-value">${health.version || '-'}</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">运行时长</span>
                        <span class="status-value">${formatUptime(health.uptimeSeconds || 0)}</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">分组数量</span>
                        <span class="status-value">${health.groups || 0}</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">已配置 Agent</span>
                        <span class="status-value">${health.agents || 0}</span>
                    </div>
                `;
            } catch (err) {
                utils.logError('加载系统状态失败:', err);
            }
        }

        // 格式化运行时长
        function formatUptime(seconds) {
            if (seconds < 60) return `${seconds}秒`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}分钟`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}小时`;
            return `${Math.floor(seconds / 86400)}天`;
        }

        // 页面加载
        window.onload = async function() {
            loadTheme();
            await Promise.all([
                loadStats(),
                loadRecentReports(),
                loadSystemStatus()
            ]);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Eval Lite - 评测控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkbox-item:hover {
            background: #e9ecef;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .test-case-list {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .test-case-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
        }

        .test-case-item:last-child {
            margin-bottom: 0;
        }

        .test-case-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
        }

        .result-card {
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .history-table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #28a745;
            color: white;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agent Eval Lite</h1>
            <p>简单易用的 Agent 评测系统</p>
        </div>

        <!-- 评测配置 -->
        <div class="card">
            <h2 class="card-title">评测配置</h2>

            <div class="form-group">
                <label>Agent 类型</label>
                <select class="form-control" id="agentType">
                    <option value="demo">Demo Agent (内置演示)</option>
                    <option value="openai">OpenAI Agent</option>
                    <option value="custom">Custom Agent</option>
                </select>
            </div>

            <div class="form-group">
                <label>评测指标</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="metric" value="correctness" checked>
                        <span>Correctness (准确性)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="metric" value="safety" checked>
                        <span>Safety (安全性)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="metric" value="response_time" checked>
                        <span>Response Time (响应时间)</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 测试用例 -->
        <div class="card">
            <h2 class="card-title">测试用例</h2>

            <div class="test-case-list" id="testCaseList">
                <div class="test-case-item">
                    <div class="test-case-grid">
                        <div>
                            <label style="font-size: 12px; color: #666;">输入</label>
                            <input type="text" class="form-control" name="input" value="2+2=?">
                        </div>
                        <div>
                            <label style="font-size: 12px; color: #666;">期望输出</label>
                            <input type="text" class="form-control" name="expected" value="4">
                        </div>
                        <button class="btn btn-danger" onclick="removeTestCase(this)">删除</button>
                    </div>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <button class="btn btn-secondary btn-sm" onclick="addTestCase()">+ 添加测试用例</button>
                <button class="btn btn-secondary btn-sm" onclick="loadSampleData()">加载示例数据</button>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="card">
            <button class="btn btn-primary" onclick="runEvaluation()" style="width: 100%;">
                🚀 开始评测
            </button>
        </div>

        <!-- 加载状态 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在评测中...</p>
        </div>

        <!-- 评测结果 -->
        <div class="card result-card" id="resultCard">
            <h2 class="card-title">评测结果</h2>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="totalTestCases">0</div>
                    <div class="stat-label">测试用例总数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="passedTestCases">0</div>
                    <div class="stat-label">通过数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="failedTestCases">0</div>
                    <div class="stat-label">失败数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="passRate">0%</div>
                    <div class="stat-label">通过率</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
            </div>

            <div id="resultDetails"></div>
        </div>

        <!-- 历史记录 -->
        <div class="card">
            <h2 class="card-title">历史记录</h2>
            <div id="historyList">
                <p style="color: #666; text-align: center;">暂无历史记录</p>
            </div>
        </div>
    </div>

    <script>
        function addTestCase(input = '', expected = '') {
            const list = document.getElementById('testCaseList');
            const item = document.createElement('div');
            item.className = 'test-case-item';
            item.innerHTML = `
                <div class="test-case-grid">
                    <div>
                        <label style="font-size: 12px; color: #666;">输入</label>
                        <input type="text" class="form-control" name="input" value="${input}">
                    </div>
                    <div>
                        <label style="font-size: 12px; color: #666;">期望输出</label>
                        <input type="text" class="form-control" name="expected" value="${expected}">
                    </div>
                    <button class="btn btn-danger" onclick="removeTestCase(this)">删除</button>
                </div>
            `;
            list.appendChild(item);
        }

        function removeTestCase(btn) {
            btn.closest('.test-case-item').remove();
        }

        function loadSampleData() {
            // Clear existing
            document.getElementById('testCaseList').innerHTML = '';

            // Add sample test cases
            const samples = [
                { input: '2+2=?', expected: '4' },
                { input: '3*3=?', expected: '9' },
                { input: '10-5=?', expected: '5' },
                { input: 'What is Java?', expected: 'Java is a programming language' }
            ];

            samples.forEach(s => addTestCase(s.input, s.expected));
        }

        async function runEvaluation() {
            // Collect test cases
            const testCases = [];
            document.querySelectorAll('.test-case-item').forEach(item => {
                const input = item.querySelector('input[name="input"]').value;
                const expected = item.querySelector('input[name="expected"]').value;
                if (input && expected) {
                    testCases.push({ input, expected });
                }
            });

            // Collect metrics
            const metrics = [];
            document.querySelectorAll('input[name="metric"]:checked').forEach(cb => {
                metrics.push(cb.value);
            });

            if (testCases.length === 0) {
                alert('请至少添加一个测试用例');
                return;
            }

            if (metrics.length === 0) {
                alert('请至少选择一个评测指标');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultCard').classList.remove('show');

            try {
                const response = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agentType: document.getElementById('agentType').value,
                        agentConfig: {},
                        metrics: metrics,
                        testCases: testCases
                    })
                });

                const result = await response.json();

                // Hide loading
                document.getElementById('loading').classList.remove('show');

                if (result.success) {
                    showResult(result);
                    loadHistory();
                } else {
                    alert('评测失败: ' + (result.error || '未知错误'));
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                alert('请求失败: ' + error.message);
            }
        }

        function showResult(result) {
            document.getElementById('resultCard').classList.add('show');

            document.getElementById('totalTestCases').textContent = result.totalTestCases;
            document.getElementById('passedTestCases').textContent = result.passedTestCases;
            document.getElementById('failedTestCases').textContent = result.failedTestCases;

            const passRate = (result.summary.pass_rate || 0).toFixed(1);
            document.getElementById('passRate').textContent = passRate + '%';

            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = passRate + '%';
            progressFill.textContent = passRate + '%';

            const details = document.getElementById('resultDetails');
            details.innerHTML = `
                <div class="alert alert-success">
                    ✅ 评测完成！执行时间: ${result.executionTimeMs} ms
                </div>
            `;
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/reports');
                const reports = await response.json();

                const historyList = document.getElementById('historyList');

                if (reports.length === 0) {
                    historyList.innerHTML = '<p style="color: #666; text-align: center;">暂无历史记录</p>';
                    return;
                }

                historyList.innerHTML = `
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>报告 ID</th>
                                <th>测试用例数</th>
                                <th>通过数</th>
                                <th>通过率</th>
                                <th>执行时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${reports.map(r => `
                                <tr>
                                    <td><code>${r.id}</code></td>
                                    <td>${r.totalTestCases}</td>
                                    <td>${r.passedTestCases}</td>
                                    <td>
                                        <span class="badge ${r.summary.pass_rate >= 70 ? 'badge-success' : 'badge-danger'}">
                                            ${r.summary.pass_rate.toFixed(1)}%
                                        </span>
                                    </td>
                                    <td>${r.executionTimeMs} ms</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('加载历史记录失败:', error);
            }
        }

        // Load history on page load
        loadHistory();
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Eval Lite - 评测控制台</title>
    <style>
        /* CSS Variables for Theme */
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-card: white;
            --text-primary: #333;
            --text-secondary: #555;
            --text-inverse: white;
            --border-color: #e0e0e0;
            --border-focus: #667eea;
            --shadow: 0 10px 30px rgba(0,0,0,0.2);
            --bg-input: white;
            --bg-checkbox-item: #f8f9fa;
            --bg-checkbox-hover: #e9ecef;
            --spinner-border: #f3f3f3;
            --spinner-top: #667eea;
            --alert-success-bg: #d4edda;
            --alert-success-text: #155724;
            --alert-error-bg: #f8d7da;
            --alert-error-text: #721c24;
            --table-header-bg: #f8f9fa;
            --table-row-hover: #f8f9fa;
        }
        
        /* Dark Theme */
        [data-theme="dark"] {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --bg-body: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-card: #252542;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-inverse: #e0e0e0;
            --border-color: #3d3d5c;
            --border-focus: #667eea;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
            --bg-input: #1e1e36;
            --bg-checkbox-item: #1e1e36;
            --bg-checkbox-hover: #2d2d4a;
            --spinner-border: #3d3d5c;
            --spinner-top: #667eea;
            --alert-success-bg: #1e4d3a;
            --alert-success-text: #7ddfb8;
            --alert-error-bg: #4d1e1e;
            --alert-error-text: #ff9999;
            --table-header-bg: #1e1e36;
            --table-row-hover: #2d2d4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }
        .header-content { text-align: center; flex: 1; }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text-inverse);
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            color: var(--text-inverse);
        }

        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text-primary);
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s, background 0.3s, color 0.3s;
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--border-focus);
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: var(--bg-checkbox-item);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-primary);
        }

        .checkbox-item:hover {
            background: var(--bg-checkbox-hover);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .test-case-list {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .test-case-item {
            background: var(--bg-checkbox-item);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
            transition: background 0.3s;
        }

        .test-case-item:last-child {
            margin-bottom: 0;
        }

        .test-case-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }

        .test-case-grid label {
            color: var(--text-secondary);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
        }

        .result-card {
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: var(--bg-checkbox-item);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #20c997);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid var(--spinner-border);
            border-top: 4px solid var(--spinner-top);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: var(--alert-success-bg);
            color: var(--alert-success-text);
            border: 1px solid;
        }

        .alert-error {
            background: var(--alert-error-bg);
            color: var(--alert-error-text);
            border: 1px solid;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .history-table th {
            background: var(--table-header-bg);
            font-weight: 600;
        }

        .history-table tr:hover {
            background: var(--table-row-hover);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: #28a745;
            color: white;
        }

        .badge-danger {
            background: #dc3545;
            color: white;
        }

        
        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 0;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            
            .card {
                padding: 15px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .checkbox-group {
                flex-direction: column;
            }
            .checkbox-item {
                width: 100%;
            }
            
            .history-table {
                font-size: 12px;
            }
            .history-table th, .history-table td {
                padding: 8px 4px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .card-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题" id="theme-btn">🌙</button>
            <div class="header-content">
                <h1>🤖 Agent Eval Lite</h1>
                <p>简单易用的 Agent 评测系统</p>
            </div>
            <div style="width: 60px;"></div>
        </div>

        <!-- 评测配置 -->
        <div class="card">
            <h2 class="card-title">评测配置</h2>

            <div class="form-group">
                <label>Agent 类型</label>
                <select class="form-control" id="agentType">
                    <option value="demo">Demo Agent (内置演示)</option>
                    <option value="openai">OpenAI Agent</option>
                    <option value="custom">Custom Agent</option>
                </select>
            </div>

            <div class="form-group">
                <label>评测指标</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" name="metric" value="correctness" checked>
                        <span>Correctness (准确性)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="metric" value="safety" checked>
                        <span>Safety (安全性)</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="metric" value="response_time" checked>
                        <span>Response Time (响应时间)</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 测试用例 -->
        <div class="card">
            <h2 class="card-title">测试用例</h2>

            <div class="test-case-list" id="testCaseList">
                <div class="test-case-item">
                    <div class="test-case-grid">
                        <div>
                            <label style="font-size: 12px;">输入</label>
                            <input type="text" class="form-control" name="input" value="2+2=?">
                        </div>
                        <div>
                            <label style="font-size: 12px;">期望输出</label>
                            <input type="text" class="form-control" name="expected" value="4">
                        </div>
                        <button class="btn btn-danger" onclick="removeTestCase(this)">删除</button>
                    </div>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <button class="btn btn-secondary btn-sm" onclick="addTestCase()">+ 添加测试用例</button>
                <button class="btn btn-secondary btn-sm" onclick="loadSampleData()">加载示例数据</button>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="card">
            <button class="btn btn-primary" onclick="runEvaluation()" style="width: 100%;">
                🚀 开始评测
            </button>
        </div>

        <!-- 加载状态 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在评测中...</p>
        </div>

        <!-- 评测结果 -->
        <div class="card result-card" id="resultCard">
            <h2 class="card-title">评测结果</h2>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="totalTestCases">0</div>
                    <div class="stat-label">测试用例总数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="passedTestCases">0</div>
                    <div class="stat-label">通过数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="failedTestCases">0</div>
                    <div class="stat-label">失败数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="passRate">0%</div>
                    <div class="stat-label">通过率</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
            </div>

            <div id="resultDetails"></div>
        </div>

        <!-- 历史记录 -->
        <div class="card">
            <h2 class="card-title">历史记录</h2>
            <div id="historyList">
                <p style="color: var(--text-secondary); text-align: center;">暂无历史记录</p>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        function showToast(message, type = 'info', duration = 3000) {
            Toast.show(message, type, duration);
        }

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            document.getElementById('theme-btn').textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }
        
        // Load saved theme
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        function addTestCase(input = '', expected = '') {
            const list = document.getElementById('testCaseList');
            const item = document.createElement('div');
            item.className = 'test-case-item';
            item.innerHTML = `
                <div class="test-case-grid">
                    <div>
                        <label style="font-size: 12px;">输入</label>
                        <input type="text" class="form-control" name="input" value="${input}">
                    </div>
                    <div>
                        <label style="font-size: 12px;">期望输出</label>
                        <input type="text" class="form-control" name="expected" value="${expected}">
                    </div>
                    <button class="btn btn-danger" onclick="removeTestCase(this)">删除</button>
                </div>
            `;
            list.appendChild(item);
        }

        function removeTestCase(btn) {
            btn.closest('.test-case-item').remove();
        }

        function loadSampleData() {
            document.getElementById('testCaseList').innerHTML = '';

            const samples = [
                { input: '2+2=?', expected: '4' },
                { input: '3*3=?', expected: '9' },
                { input: '10-5=?', expected: '5' },
                { input: 'What is Java?', expected: 'Java is a programming language' }
            ];

            samples.forEach(s => addTestCase(s.input, s.expected));
        }

        async function runEvaluation() {
            const testCases = [];
            document.querySelectorAll('.test-case-item').forEach(item => {
                const input = item.querySelector('input[name="input"]').value;
                const expected = item.querySelector('input[name="expected"]').value;
                if (input && expected) {
                    testCases.push({ input, expected });
                }
            });

            const metrics = [];
            document.querySelectorAll('input[name="metric"]:checked').forEach(cb => {
                metrics.push(cb.value);
            });

            if (testCases.length === 0) {
                showToast('请至少添加一个测试用例', 'error');
                return;
            }

            if (metrics.length === 0) {
                showToast('请至少选择一个评测指标', 'error');
                return;
            }

            document.getElementById('loading').classList.add('show');
            document.getElementById('resultCard').classList.remove('show');

            try {
                const response = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agentType: document.getElementById('agentType').value,
                        agentConfig: {},
                        metrics: metrics,
                        testCases: testCases
                    })
                });

                const result = await response.json();

                document.getElementById('loading').classList.remove('show');

                if (result.success) {
                    showResult(result);
                    loadHistory();
                } else {
                    showToast('评测失败: ' + (result.error || '未知错误'), 'error');
                }
            } catch (error) {
                document.getElementById('loading').classList.remove('show');
                showToast('请求失败: ' + error.message, 'error');
            }
        }

        function showResult(result) {
            document.getElementById('resultCard').classList.add('show');

            document.getElementById('totalTestCases').textContent = result.totalTestCases;
            document.getElementById('passedTestCases').textContent = result.passedTestCases;
            document.getElementById('failedTestCases').textContent = result.failedTestCases;

            const passRate = (result.summary.pass_rate || 0).toFixed(1);
            document.getElementById('passRate').textContent = passRate + '%';

            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = passRate + '%';
            progressFill.textContent = passRate + '%';

            const details = document.getElementById('resultDetails');
            details.innerHTML = `
                <div class="alert alert-success">
                    ✅ 评测完成！执行时间: ${result.executionTimeMs} ms
                </div>
                <button class="btn btn-primary" onclick="showResultDetails('${result.reportId}')" style="margin-top: 10px;">
                    🔍 查看详情
                </button>
            `;
        }
        
        async function showResultDetails(reportId) {
            try {
                const response = await fetch(`/api/reports/${reportId}`);
                const data = await response.json();
                if (!data.success) {
                    showToast('获取详情失败', 'error');
                    return;
                }
                
                const evaluations = data.evaluations || [];
                const modal = document.getElementById('result-detail-modal');
                const modalContent = document.getElementById('result-detail-content');
                
                modalContent.innerHTML = `
                    <div style="margin-bottom: 20px;">
                        <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                            <div class="stat-box">
                                <div class="stat-value">${data.totalTestCases}</div>
                                <div class="stat-label">总用例数</div>
                            </div>
                            <div class="stat-box" style="background: linear-gradient(135deg, #28a745, #20c997);">
                                <div class="stat-value">${data.passedTestCases}</div>
                                <div class="stat-label">通过数</div>
                            </div>
                            <div class="stat-box" style="background: linear-gradient(135deg, #dc3545, #c82333);">
                                <div class="stat-value">${data.failedTestCases}</div>
                                <div class="stat-label">失败数</div>
                            </div>
                        </div>
                    </div>
                    <h4 style="margin-bottom: 10px;">📋 各用例评测结果</h4>
                    <div style="max-height: 400px; overflow-y: auto;">
                        ${evaluations.map((ev, i) => `
                            <div style="background: var(--bg-checkbox-item); padding: 15px; border-radius: 8px; margin-bottom: 10px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                    <strong>#${i + 1} 测试用例</strong>
                                    <span class="badge ${ev.passed ? 'badge-success' : 'badge-danger'}">
                                        ${ev.passed ? '✅ 通过' : '❌ 失败'}
                                    </span>
                                </div>
                                <div style="font-size: 13px; color: var(--text-secondary);">
                                    <p><strong>输入:</strong> ${ev.testCase?.input || ev.testCaseId || '-'}</p>
                                    <p><strong>期望:</strong> ${ev.testCase?.expected || '-'}</p>
                                    <p><strong>Agent 输出:</strong> ${ev.agentOutput || '-'}</p>
                                    <p><strong>评分:</strong> ${((ev.overallScore || 0) * 100).toFixed(0)}%</p>
                                    ${ev.scorerResults ? Object.entries(ev.scorerResults).map(([name, sr]) => `
                                        <div style="margin-left: 15px; margin-top: 5px; padding: 5px 10px; background: var(--bg-card); border-radius: 4px;">
                                            <span>${name}: ${((sr.score || 0) * 100).toFixed(0)}%</span>
                                            <span style="margin-left: 10px; color: ${sr.passed ? '#28a745' : '#dc3545'};">${sr.passed ? '✓' : '✗'}</span>
                                            ${sr.rationale ? `<p style="margin: 3px 0 0 0; font-size: 12px;">${sr.rationale}</p>` : ''}
                                        </div>
                                    `).join('') : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                modal.style.display = 'flex';
            } catch (error) {
                console.error('获取详情失败:', error);
                showToast('获取详情失败', 'error');
            }
        }
        
        function closeResultDetailModal() {
            document.getElementById('result-detail-modal').style.display = 'none';
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/reports');
                const reports = await response.json();

                const historyList = document.getElementById('historyList');

                if (reports.length === 0) {
                    historyList.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">暂无历史记录</p>';
                    return;
                }

                historyList.innerHTML = `
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>报告 ID</th>
                                <th>测试用例数</th>
                                <th>通过数</th>
                                <th>通过率</th>
                                <th>执行时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${reports.map(r => `
                                <tr>
                                    <td><code>${r.id}</code></td>
                                    <td>${r.totalTestCases}</td>
                                    <td>${r.passedTestCases}</td>
                                    <td>
                                        <span class="badge ${r.summary.pass_rate >= 70 ? 'badge-success' : 'badge-danger'}">
                                            ${r.summary.pass_rate.toFixed(1)}%
                                        </span>
                                    </td>
                                    <td>${r.executionTimeMs} ms</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error('加载历史记录失败:', error);
                historyList.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">加载历史记录失败</p>';
            }
        }

        // Load theme and history on page load
        loadTheme();
        loadHistory();
    </script>

    <!-- 评测详情模态框 -->
    <div id="result-detail-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: var(--bg-card); border-radius: 12px; padding: 30px; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--text-primary);">📊 评测详情</h2>
                <button onclick="closeResultDetailModal()" style="background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-secondary);">×</button>
            </div>
            <div id="result-detail-content"></div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>样例管理 - Agent Eval Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab:hover { transform: translateY(-2px); }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }
        .card.show { display: block; }
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 15px;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn:hover { transform: translateY(-2px); }
        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .table th, .table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        .table th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .table tr:hover { background: #f8f9fa; }
        .checkbox-cell {
            width: 40px;
            text-align: center;
        }
        .checkbox-cell input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-info { background: #17a2b8; color: white; }
        .actions { display: flex; gap: 5px; }
        .loading { display: none; text-align: center; padding: 20px; }
        .loading.show { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 样例管理</h1>
            <p>测试用例集管理与选择性评测</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('cases')">📋 测试用例</button>
            <button class="tab" onclick="switchTab('groups')">📁 分组管理</button>
            <button class="tab" onclick="switchTab('evaluate')">🚀 选择性评测</button>
        </div>

        <!-- 测试用例管理 -->
        <div id="cases-card" class="card show">
            <h2 class="card-title">测试用例列表</h2>

            <div class="form-row">
                <input type="text" class="form-control" id="case-name" placeholder="用例名称">
                <input type="text" class="form-control" id="case-input" placeholder="输入">
                <input type="text" class="form-control" id="case-expected" placeholder="期望输出">
                <button class="btn btn-primary" onclick="createTestCase()">添加</button>
            </div>

            <div class="loading" id="cases-loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>

            <table class="table" id="cases-table">
                <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" id="select-all-cases"></th>
                        <th>名称</th>
                        <th>输入</th>
                        <th>期望输出</th>
                        <th>分组</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="cases-tbody"></tbody>
            </table>
        </div>

        <!-- 分组管理 -->
        <div id="groups-card" class="card">
            <h2 class="card-title">分组管理</h2>

            <div class="form-row">
                <input type="text" class="form-control" id="group-name" placeholder="分组名称">
                <input type="text" class="form-control" id="group-desc" placeholder="分组描述">
                <button class="btn btn-primary" onclick="createGroup()">创建分组</button>
            </div>

            <div class="loading" id="groups-loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>

            <table class="table" id="groups-table">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>描述</th>
                        <th>用例数量</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="groups-tbody"></tbody>
            </table>
        </div>

        <!-- 选择性评测 -->
        <div id="evaluate-card" class="card">
            <h2 class="card-title">选择性评测</h2>

            <div class="action-bar">
                <button class="btn btn-success" onclick="runEvaluation()">▶ 运行选中用例</button>
                <select class="form-control" id="eval-group" style="width: auto;" onchange="loadGroupCases()">
                    <option value="">选择分组...</option>
                </select>
                <button class="btn btn-primary" onclick="runGroupEvaluation()">按分组评测</button>
            </div>

            <div class="loading" id="eval-loading">
                <div class="spinner"></div>
                <p>评测中...</p>
            </div>

            <div id="eval-result" style="display: none;">
                <div style="background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    ✅ 评测完成！通过率: <span id="pass-rate">0%</span>
                    <button class="btn btn-primary btn-sm" style="margin-left: 20px;" onclick="showEvalDetails()">查看详情</button>
                    <button class="btn btn-success btn-sm" style="margin-left: 10px;" onclick="exportReport('json')">导出 JSON</button>
                    <button class="btn btn-success btn-sm" style="margin-left: 5px;" onclick="exportReport('csv')">导出 CSV</button>
                </div>
            </div>

            <div id="eval-details" style="display: none; margin-bottom: 20px;">
                <h3>评测详情</h3>
                <table class="table" id="details-table">
                    <thead>
                        <tr>
                            <th>用例名称</th>
                            <th>输入</th>
                            <th>期望输出</th>
                            <th>实际输出</th>
                            <th>评分</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="details-tbody"></tbody>
                </table>
            </div>

            <table class="table" id="eval-table">
                <thead>
                    <tr>
                        <th class="checkbox-cell"><input type="checkbox" id="select-all-eval"></th>
                        <th>名称</th>
                        <th>输入</th>
                        <th>期望输出</th>
                    </tr>
                </thead>
                <tbody id="eval-tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let testCases = [];
        let groups = [];

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.card').forEach(c => c.classList.remove('show'));

            event.target.classList.add('active');
            document.getElementById(`${tab}-card`).classList.add('show');

            if (tab === 'cases') loadTestCases();
            else if (tab === 'groups') loadGroups();
            else if (tab === 'evaluate') loadTestCases();
        }

        // 加载测试用例
        async function loadTestCases() {
            document.getElementById('cases-loading').classList.add('show');
            try {
                const response = await fetch('/api/testcases');
                const data = await response.json();
                testCases = data.testCases || [];

                const tbody = document.getElementById('cases-tbody');
                tbody.innerHTML = testCases.map(tc => `
                    <tr>
                        <td class="checkbox-cell"><input type="checkbox" class="case-checkbox" value="${tc.id}"></td>
                        <td>${tc.name}</td>
                        <td>${tc.input}</td>
                        <td>${tc.expected}</td>
                        <td><span class="badge badge-info">${tc.groupId || '未分组'}</span></td>
                        <td class="actions">
                            <button class="btn btn-danger btn-sm" onclick="deleteTestCase('${tc.id}')">删除</button>
                        </td>
                    </tr>
                `).join('');

                // 更新评测表格
                const evalTbody = document.getElementById('eval-tbody');
                evalTbody.innerHTML = testCases.map(tc => `
                    <tr>
                        <td class="checkbox-cell"><input type="checkbox" class="eval-checkbox" value="${tc.id}"></td>
                        <td>${tc.name}</td>
                        <td>${tc.input}</td>
                        <td>${tc.expected}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load test cases:', error);
            } finally {
                document.getElementById('cases-loading').classList.remove('show');
            }
        }

        // 创建测试用例
        async function createTestCase() {
            const name = document.getElementById('case-name').value;
            const input = document.getElementById('case-input').value;
            const expected = document.getElementById('case-expected').value;

            if (!input || !expected) {
                alert('请填写输入和期望输出');
                return;
            }

            try {
                await fetch('/api/testcases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, input, expected })
                });
                loadTestCases();
                document.getElementById('case-name').value = '';
                document.getElementById('case-input').value = '';
                document.getElementById('case-expected').value = '';
            } catch (error) {
                console.error('Failed to create test case:', error);
            }
        }

        // 删除测试用例
        async function deleteTestCase(id) {
            if (!confirm('确定删除该测试用例?')) return;

            try {
                await fetch(`/api/testcases/${id}`, { method: 'DELETE' });
                loadTestCases();
            } catch (error) {
                console.error('Failed to delete test case:', error);
            }
        }

        // 加载分组
        async function loadGroups() {
            document.getElementById('groups-loading').classList.add('show');
            try {
                const response = await fetch('/api/groups');
                const data = await response.json();
                groups = data.groups || [];

                const tbody = document.getElementById('groups-tbody');
                tbody.innerHTML = groups.map(g => `
                    <tr>
                        <td>${g.name}</td>
                        <td>${g.description || '-'}</td>
                        <td>${g.testCaseIds ? g.testCaseIds.length : 0}</td>
                        <td class="actions">
                            <button class="btn btn-danger btn-sm" onclick="deleteGroup('${g.id}')">删除</button>
                        </td>
                    </tr>
                `).join('');

                // 更新分组选择器
                const select = document.getElementById('eval-group');
                select.innerHTML = '<option value="">选择分组...</option>' +
                    groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            } catch (error) {
                console.error('Failed to load groups:', error);
            } finally {
                document.getElementById('groups-loading').classList.remove('show');
            }
        }

        // 创建分组
        async function createGroup() {
            const name = document.getElementById('group-name').value;
            const description = document.getElementById('group-desc').value;

            if (!name) {
                alert('请填写分组名称');
                return;
            }

            try {
                await fetch('/api/groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                });
                loadGroups();
                document.getElementById('group-name').value = '';
                document.getElementById('group-desc').value = '';
            } catch (error) {
                console.error('Failed to create group:', error);
            }
        }

        // 删除分组
        async function deleteGroup(id) {
            if (!confirm('确定删除该分组?')) return;

            try {
                await fetch(`/api/groups/${id}`, { method: 'DELETE' });
                loadGroups();
            } catch (error) {
                console.error('Failed to delete group:', error);
            }
        }

        // 运行评测 (选中用例)
        async function runEvaluation() {
            const checkboxes = document.querySelectorAll('.eval-checkbox:checked');
            const caseIds = Array.from(checkboxes).map(cb => cb.value);

            if (caseIds.length === 0) {
                alert('请至少选择一个测试用例');
                return;
            }

            document.getElementById('eval-loading').classList.add('show');
            document.getElementById('eval-result').style.display = 'none';
            document.getElementById('eval-details').style.display = 'none';

            try {
                const response = await fetch('/api/evaluate/cases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        caseIds,
                        metrics: ['correctness', 'safety'],
                        agentType: 'demo'
                    })
                });

                const data = await response.json();
                if (data.success) {
                    const passRate = data.summary.pass_rate.toFixed(1);
                    document.getElementById('pass-rate').textContent = passRate + '%';
                    document.getElementById('eval-result').style.display = 'block';
                    
                    // 保存评测结果供详情查看和导出
                    window.lastEvaluation = data;
                    window.lastReportId = data.reportId;
                }
            } catch (error) {
                console.error('Evaluation failed:', error);
            } finally {
                document.getElementById('eval-loading').classList.remove('show');
            }
        }

        // 显示评测详情
        function showEvalDetails() {
            const detailsDiv = document.getElementById('eval-details');
            const tbody = document.getElementById('details-tbody');
            
            if (!window.lastEvaluation || !window.lastEvaluation.evaluations) {
                alert('没有评测详情');
                return;
            }
            
            const evaluations = window.lastEvaluation.evaluations;
            tbody.innerHTML = evaluations.map(ev => {
                const testCase = testCases.find(tc => tc.id === ev.testCaseId) || {};
                const scorerNames = Object.keys(ev.scorerResults).join(', ');
                const scorerScores = Object.values(ev.scorerResults).map(sr => sr.score.toFixed(2)).join(', ');
                
                return `
                    <tr>
                        <td>${testCase.name || ev.testCaseId}</td>
                        <td>${testCase.input || '-'}</td>
                        <td>${testCase.expected || '-'}</td>
                        <td>${testCase.actual || '-'}</td>
                        <td>${scorerScores} (${scorerNames})</td>
                        <td>
                            <span class="badge ${ev.passed ? 'badge-success' : 'badge-danger'}">
                                ${ev.passed ? '通过' : '失败'}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
            
            detailsDiv.style.display = 'block';
        }

        // 导出报告
        function exportReport(format) {
            if (!window.lastReportId) {
                alert('没有可导出的评测报告');
                return;
            }
            
            const url = `/api/reports/${window.lastReportId}/export?format=${format}`;
            window.open(url, '_blank');
        }

        // 按分组评测
        async function runGroupEvaluation() {
            const groupId = document.getElementById('eval-group').value;
            if (!groupId) {
                alert('请选择一个分组');
                return;
            }

            document.getElementById('eval-loading').classList.add('show');
            document.getElementById('eval-result').style.display = 'none';

            try {
                const response = await fetch(`/api/evaluate/group/${groupId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        metrics: ['correctness', 'safety'],
                        agentType: 'demo'
                    })
                });

                const data = await response.json();
                if (data.success) {
                    const passRate = data.summary.pass_rate.toFixed(1);
                    document.getElementById('pass-rate').textContent = passRate + '%';
                    document.getElementById('eval-result').style.display = 'block';
                }
            } catch (error) {
                console.error('Evaluation failed:', error);
            } finally {
                document.getElementById('eval-loading').classList.remove('show');
            }
        }

        // 加载分组用例
        function loadGroupCases() {
            const groupId = document.getElementById('eval-group').value;
            if (!groupId) {
                loadTestCases();
                return;
            }

            const group = groups.find(g => g.id === groupId);
            if (group && group.testCaseIds) {
                document.querySelectorAll('.eval-checkbox').forEach(cb => {
                    cb.checked = group.testCaseIds.includes(cb.value);
                });
            }
        }

        // 页面加载时初始化
        loadTestCases();
        loadGroups();
    </script>
</body>
</html>
